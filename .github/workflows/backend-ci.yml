name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  restore-build-test:
    name: Restore, build, and test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ExpenseFlow.sln

      - name: Build
        run: dotnet build ExpenseFlow.sln --no-restore

      - name: Test
        run: dotnet test ExpenseFlow.sln --no-build --verbosity normal
